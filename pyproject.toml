[tool.pytest.ini_options]
testpaths = [
  "libs/common-python/tests",
  "apps/control-plane-api/tests",
  "apps/inference-service/tests",
  "apps/rag-service/tests",
  "pipelines/evaluate-rag/tests",
  "pipelines/ingest-rag/tests",
  "pipelines/train-claims-risk/tests"
]
addopts = "-q --import-mode=importlib"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
