services:
  postgres:
    image: postgres:16-alpine
    container_name: careai-postgres
    environment:
      POSTGRES_USER: careai
      POSTGRES_PASSWORD: careai_dev_password
      POSTGRES_DB: careai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careai -d careai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: careai-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    container_name: careai-mlflow
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:////mlflow/mlflow.db
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
    ports:
      - "${MLFLOW_HOST_PORT:-5001}:5000"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    command:
      - /bin/sh
      - -c
      - mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri "$$MLFLOW_BACKEND_STORE_URI" --artifacts-destination "$$MLFLOW_ARTIFACT_ROOT"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.33.0
    container_name: careai-azurite
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data

  control-plane-api:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: apps/control-plane-api/Dockerfile
    container_name: careai-control-plane-api
    environment:
      SERVICE_NAME: control-plane-api
      SERVICE_PORT: "8000"
      CONTROL_PLANE_DATABASE_URL: postgresql+psycopg://careai:careai_dev_password@postgres:5432/careai
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-payer-demo}
      TENANT_MODE: ${TENANT_MODE:-single}
      AZURE_EVENTHUB_NAME: ${AZURE_EVENTHUB_NAME:-}
      AZURE_EVENTHUB_FULLY_QUALIFIED_NAMESPACE: ${AZURE_EVENTHUB_FULLY_QUALIFIED_NAMESPACE:-}
      AZURE_EVENTHUB_CONNECTION_STRING: ${AZURE_EVENTHUB_CONNECTION_STRING:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  inference-service:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: apps/inference-service/Dockerfile
    container_name: careai-inference-service
    environment:
      SERVICE_NAME: inference-service
      SERVICE_PORT: "8001"
      CONTROL_PLANE_API_URL: http://control-plane-api:8000
      CONTROL_PLANE_URL: http://control-plane-api:8000
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-payer-demo}
      TENANT_MODE: ${TENANT_MODE:-single}
      CLAIMS_RISK_MODEL_URI: ${CLAIMS_RISK_MODEL_URI:-}
      CLAIMS_RISK_MODEL_PATH: ${CLAIMS_RISK_MODEL_PATH:-}
      CLAIMS_RISK_MODEL_METADATA_PATH: ${CLAIMS_RISK_MODEL_METADATA_PATH:-}
      CLAIMS_RISK_FEATURE_VERSION: ${CLAIMS_RISK_FEATURE_VERSION:-claims-risk-features-v1}
      CLAIMS_RISK_MAX_FEATURE_AGE_MINUTES: ${CLAIMS_RISK_MAX_FEATURE_AGE_MINUTES:-1440}
      CLAIMS_RISK_CHAMPION_MODEL_URI: ${CLAIMS_RISK_CHAMPION_MODEL_URI:-}
      CLAIMS_RISK_CHALLENGER_MODEL_URI: ${CLAIMS_RISK_CHALLENGER_MODEL_URI:-}
      CLAIMS_RISK_TRAFFIC_SPLIT_JSON: ${CLAIMS_RISK_TRAFFIC_SPLIT_JSON:-}
      INFERENCE_AUDIT_ENABLED: ${INFERENCE_AUDIT_ENABLED:-true}
      INFERENCE_MONITORING_ENABLED: ${INFERENCE_MONITORING_ENABLED:-true}
      AZURE_EVENTHUB_NAME: ${AZURE_EVENTHUB_NAME:-}
      AZURE_EVENTHUB_FULLY_QUALIFIED_NAMESPACE: ${AZURE_EVENTHUB_FULLY_QUALIFIED_NAMESPACE:-}
      AZURE_EVENTHUB_CONNECTION_STRING: ${AZURE_EVENTHUB_CONNECTION_STRING:-}
    ports:
      - "8001:8001"
    depends_on:
      control-plane-api:
        condition: service_healthy
      redis:
        condition: service_healthy

  rag-service:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: apps/rag-service/Dockerfile
    container_name: careai-rag-service
    environment:
      SERVICE_NAME: rag-service
      SERVICE_PORT: "8002"
      CONTROL_PLANE_API_URL: http://control-plane-api:8000
      CONTROL_PLANE_URL: http://control-plane-api:8000
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-payer-demo}
      TENANT_MODE: ${TENANT_MODE:-single}
      RAG_DOCS_DIR: data/synthetic_docs
      RAG_LOCAL_INDEX_PATH: data/local/rag-index.json
      RAG_AUDIT_ENABLED: ${RAG_AUDIT_ENABLED:-true}
      AZURE_AI_SEARCH_ENDPOINT: ${AZURE_AI_SEARCH_ENDPOINT:-}
      AZURE_AI_SEARCH_INDEX: ${AZURE_AI_SEARCH_INDEX:-careai-rag-chunks}
      AZURE_AI_SEARCH_INDEX_NAME: ${AZURE_AI_SEARCH_INDEX_NAME:-careai-rag-chunks}
      AZURE_AI_SEARCH_API_KEY: ${AZURE_AI_SEARCH_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${AZURE_OPENAI_CHAT_DEPLOYMENT:-}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-}
      AZURE_EVENTHUB_NAME: ${AZURE_EVENTHUB_NAME:-}
      AZURE_EVENTHUB_FULLY_QUALIFIED_NAMESPACE: ${AZURE_EVENTHUB_FULLY_QUALIFIED_NAMESPACE:-}
      AZURE_EVENTHUB_CONNECTION_STRING: ${AZURE_EVENTHUB_CONNECTION_STRING:-}
    ports:
      - "8002:8002"
    depends_on:
      control-plane-api:
        condition: service_healthy
      redis:
        condition: service_healthy

  web-console:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: apps/web-console
      args:
        VITE_CONTROL_PLANE_API_URL: ${VITE_CONTROL_PLANE_API_URL:-http://localhost:8000}
        VITE_RAG_SERVICE_URL: ${VITE_RAG_SERVICE_URL:-http://localhost:8002}
        VITE_DEFAULT_TENANT_ID: ${VITE_DEFAULT_TENANT_ID:-payer-demo}
    container_name: careai-web-console
    ports:
      - "3000:8080"
    depends_on:
      control-plane-api:
        condition: service_healthy
      inference-service:
        condition: service_healthy
      rag-service:
        condition: service_healthy

volumes:
  postgres-data:
  mlflow-artifacts:
  azurite-data:
