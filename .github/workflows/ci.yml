name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DOCKER_PLATFORM: linux/amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-console/package-lock.json

      - name: Install dependencies
        run: make setup

      - name: Check Python formatting
        run: .venv/bin/python -m ruff format --check .

      - name: Lint Python
        run: .venv/bin/python -m ruff check .

      - name: Run pytest
        run: .venv/bin/python -m pytest

      - name: Frontend smoke test
        run: npm --prefix apps/web-console test

      - name: Lint frontend
        run: npm --prefix apps/web-console run lint

      - name: Build frontend
        run: npm --prefix apps/web-console run build

      - name: Non-blocking static security checks
        continue-on-error: true
        run: make security-check

      - name: Build Docker images
        run: make docker-build
